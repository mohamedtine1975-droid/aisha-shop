<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aïsha-T Shop — Administration</title>
  <meta name="robots" content="noindex, nofollow">
  
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Admin CSS -->
  <link rel="stylesheet" href="css/admin.css">

  <style>
    @keyframes loginOut { to { opacity:0; transform:scale(1.05) translateY(-20px); } }
  </style>
</head>
<body>

<!-- ==================== LOGIN PAGE ==================== -->
<div id="loginPage" class="login-page" style="display:none">
  <div class="login-bg-circles">
    <div class="lbc"></div>
    <div class="lbc"></div>
    <div class="lbc"></div>
  </div>

  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">🌸</div>
      <div class="brand">Aïsha-T Shop</div>
      <div class="sub">Espace Administration</div>
    </div>

    <h2 class="login-title">Connexion</h2>
    <p class="login-sub">Entrez vos identifiants pour accéder au tableau de bord</p>

    <div class="login-error" id="loginError"></div>

    <form class="login-form" id="loginForm" onsubmit="return false">
      <div class="field">
        <label>IDENTIFIANT</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input type="text" id="loginUser" placeholder="aisha" autocomplete="username" required>
        </div>
      </div>
      <div class="field">
        <label>MOT DE PASSE</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password" required>
          <button type="button" class="toggle-pw" onclick="togglePassword()">👁️</button>
        </div>
      </div>
      <button type="submit" class="btn-login" onclick="doLogin()">Se connecter →</button>
    </form>

    <div class="login-footer">
      <a href="index.html" style="color:var(--muted)">← Retour à la boutique</a>
    </div>
  </div>
</div>

<!-- ==================== ADMIN APP ==================== -->
<div id="adminApp">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="brand">Aïsha-T Shop</div>
      <div class="role">Panneau d'administration</div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Principal</div>

      <button class="sidebar-link" data-page="dashboard" onclick="navigateTo('dashboard')">
        <span class="icon">📊</span>
        Tableau de bord
      </button>
      <button class="sidebar-link" data-page="products" onclick="navigateTo('products')">
        <span class="icon">🛍️</span>
        Produits
      </button>
      <button class="sidebar-link" data-page="orders" onclick="navigateTo('orders')">
        <span class="icon">📦</span>
        Commandes
        <span class="badge-count">2</span>
      </button>

      <div class="nav-section-label">Communication</div>

      <button class="sidebar-link" data-page="messages" onclick="navigateTo('messages')">
        <span class="icon">💬</span>
        Messages
        <span class="badge-count">2</span>
      </button>

      <div class="nav-section-label">Système</div>

      <button class="sidebar-link" data-page="settings" onclick="navigateTo('settings')">
        <span class="icon">⚙️</span>
        Paramètres
      </button>
      <a class="sidebar-link" href="index.html" target="_blank">
        <span class="icon">🌐</span>
        Voir la boutique
      </a>
    </nav>

    <div class="sidebar-bottom">
      <div class="sidebar-user">
        <div class="user-avatar">👩🏾</div>
        <div>
          <div class="user-name">Aïsha</div>
          <div class="user-email">Administratrice</div>
        </div>
      </div>
      <button class="btn-logout" onclick="logout()">🚪 Se déconnecter</button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <div class="main-content">

    <!-- TOPBAR -->
    <div class="topbar">
      <div class="topbar-left">
        <button class="topbar-btn" onclick="toggleSidebar()" style="display:none" id="menuBtn">☰</button>
        <h1 class="page-title" id="pageTitle">Tableau de bord</h1>
      </div>
      <div class="topbar-right">
        <div class="topbar-search">
          <span>🔍</span>
          <input type="text" placeholder="Rechercher...">
        </div>
        <button class="topbar-btn" title="Notifications">
          🔔
          <span class="notif-dot"></span>
        </button>
        <button class="topbar-btn" title="Voir la boutique" onclick="window.open('index.html','_blank')">🌐</button>
        <button class="topbar-btn" title="Déconnexion" onclick="logout()">🚪</button>
      </div>
    </div>

    <!-- CONTENT -->
    <div class="content-area" id="contentArea">
      <!-- Dynamic content rendered by JS -->
    </div>

  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<!-- Admin JS -->
<script src="js/admin.js"></script>

<script>
  // Responsive menu button
  if (window.innerWidth <= 768) {
    document.getElementById('menuBtn').style.display = 'flex';
  }
</script>
</body>
</html>
